<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout Renderer</title>
  <style>
    /* Page base */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica Neue, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background: #0d0f14;
      color: #e6e6e6;
      overflow: hidden;
    }

    /* Top control bar */
    .toolbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 16px;
      background: rgba(18, 20, 28, 0.92);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      z-index: 10;
      backdrop-filter: blur(8px);
    }

    .toolbar .group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar label {
      font-size: 12px;
      color: #b9c0d4;
    }

    .toolbar input[type="range"] {
      width: 200px;
    }

    .toolbar button {
      height: 32px;
      padding: 0 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.08);
      background: #1a1f2b;
      color: #e6e6e6;
      cursor: pointer;
    }

    .toolbar button:hover {
      background: #21283a;
    }

    .toolbar textarea {
      width: 520px;
      height: 32px;
      resize: vertical;
      min-height: 32px;
      max-height: 240px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0f1320;
      color: #dfe3ec;
      padding: 6px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      line-height: 1.4;
    }

    /* Scroll area */
    .stage-wrap {
      position: absolute;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow: auto;
      background: #0d0f14;
    }

    /* Infinite-ish grid background */
    .stage {
      position: relative;
      width: 5200px; /* can be expanded from UI */
      height: 20000px;
      margin: 0;
      transform-origin: 0 0;
      background-image:
        linear-gradient(#11151d 1px, transparent 1px),
        linear-gradient(90deg, #11151d 1px, transparent 1px),
        linear-gradient(#0e1220 1px, transparent 1px),
        linear-gradient(90deg, #0e1220 1px, transparent 1px);
      background-size: 40px 40px, 40px 40px, 200px 200px, 200px 200px;
      background-position: 0 0, 0 0, -1px -1px, -1px -1px;
    }

    /* Rendered blocks */
    .node {
      position: absolute;
      box-sizing: border-box;
      overflow: hidden;
    }

    .node.frame {
      /* Optional subtle outline for white boxes on dark grid */
      outline: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 2px;
    }

    .node.text {
      color: #f0f0f0;
      white-space: pre-wrap;
    }

    .node.arrow {
      /* We draw arrows/lines as 0-height boxes with border-top */
      height: 0 !important;
      border: none;
      overflow: visible;
    }

    .node.arrow .line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      border-top: 2px solid #ff0000; /* default; will be overridden */
      transform-origin: 0 0;
    }

    .legend {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 10px;
      line-height: 1;
      color: rgba(0,0,0,0.6);
      background: rgba(255,255,255,0.7);
      border-radius: 3px;
      padding: 2px 4px;
      pointer-events: none;
      user-select: none;
    }

    .legend.dark {
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.45);
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="group">
      <label for="zoom">Масштаб</label>
      <input id="zoom" type="range" min="0.25" max="2" value="0.6" step="0.05" />
      <button id="fitWidth">Подогнать по ширине</button>
      <button id="clear">Очистить</button>
    </div>
    <div class="group" style="margin-left:auto;">
      <label for="spec">Спецификация</label>
      <textarea id="spec" placeholder="Вставьте сюда блоки со свойствами..." spellcheck="false"></textarea>
      <button id="render">Отрисовать</button>
    </div>
  </div>

  <div class="stage-wrap" id="stageWrap">
    <div class="stage" id="stage"></div>
  </div>

  <script>
    const stage = document.getElementById('stage');
    const stageWrap = document.getElementById('stageWrap');
    const zoomInput = document.getElementById('zoom');
    const fitWidthBtn = document.getElementById('fitWidth');
    const clearBtn = document.getElementById('clear');
    const renderBtn = document.getElementById('render');
    const specInput = document.getElementById('spec');

    function pxToNumber(value) {
      if (typeof value !== 'string') return value;
      const n = parseFloat(value.replace('px', '').trim());
      return Number.isFinite(n) ? n : 0;
    }

    function parseBorder(value) {
      // Example: "2px solid #FF0000"
      if (!value) return null;
      const parts = value.trim().split(/\s+/);
      if (parts.length < 3) return null;
      return {
        width: pxToNumber(parts[0]),
        style: parts[1],
        color: parts[2]
      };
    }

    function parseTransform(value) {
      if (!value) return null;
      const v = value.trim();
      if (v.startsWith('rotate(')) {
        const angle = parseFloat(v.slice(7)); // drop 'rotate('
        return { type: 'rotate', angle };
      }
      if (v.startsWith('matrix(')) {
        const inside = v.slice(7, -1);
        const nums = inside.split(',').map(s => parseFloat(s.trim()));
        if (nums.length === 6) {
          return { type: 'matrix', a: nums[0], b: nums[1], c: nums[2], d: nums[3], e: nums[4], f: nums[5] };
        }
      }
      return { type: 'raw', value: v };
    }

    function parseBlocks(spec) {
      const blocks = [];
      const re = /\/\*([\s\S]*?)\*\/([\s\S]*?)(?=\/\*|$)/g;
      let match;
      while ((match = re.exec(spec)) !== null) {
        const name = match[1].trim();
        const body = match[2];
        const lines = body.split(/\n|\r/).map(l => l.trim()).filter(Boolean);
        const props = {};
        for (const line of lines) {
          const m = line.match(/^([a-zA-Z\-]+)\s*:\s*([^;]+);?$/);
          if (m) {
            const key = m[1].trim();
            const val = m[2].trim();
            props[key] = val;
          }
        }
        blocks.push({ name, props });
      }
      return blocks;
    }

    function classifyBlock(block) {
      const n = block.name.toLowerCase();
      const p = block.props;
      if (n.startsWith('arrow') || p['border'] && pxToNumber(p['height']) === 0) return 'arrow';
      if (p['font-family'] || p['font-size'] || p['color']) return 'text';
      return 'frame';
    }

    function applyPositionAndSize(el, props) {
      el.style.position = 'absolute';
      if (props.left) el.style.left = pxToNumber(props.left) + 'px';
      if (props.top) el.style.top = pxToNumber(props.top) + 'px';
      if (props.width) el.style.width = pxToNumber(props.width) + 'px';
      if (props.height) el.style.height = pxToNumber(props.height) + 'px';
      // background
      if (props.background) el.style.background = props.background;
    }

    function renderFrame(block) {
      const el = document.createElement('div');
      el.className = 'node frame';
      applyPositionAndSize(el, block.props);

      // Show a tiny corner legend with the name for orientation
      const bg = (block.props.background || '').toLowerCase();
      const legend = document.createElement('div');
      legend.className = 'legend' + (bg.includes('#000') ? ' dark' : '');
      legend.textContent = block.name;
      el.appendChild(legend);

      stage.appendChild(el);
    }

    function renderText(block) {
      const el = document.createElement('div');
      el.className = 'node text';
      applyPositionAndSize(el, block.props);

      // Typography
      if (block.props['font-family']) el.style.fontFamily = block.props['font-family'].replace(/'^|'$/g, '');
      if (block.props['font-style']) el.style.fontStyle = block.props['font-style'];
      if (block.props['font-weight']) el.style.fontWeight = block.props['font-weight'];
      if (block.props['font-size']) el.style.fontSize = pxToNumber(block.props['font-size']) + 'px';
      if (block.props['line-height']) el.style.lineHeight = block.props['line-height'];
      if (block.props['color']) el.style.color = block.props['color'];

      el.textContent = block.name;
      stage.appendChild(el);
    }

    function renderArrow(block) {
      // Represent arrow/line as a container with a child .line that uses border-top
      const el = document.createElement('div');
      el.className = 'node arrow';
      applyPositionAndSize(el, block.props);

      const line = document.createElement('div');
      line.className = 'line';

      // width from props
      const widthPx = pxToNumber(block.props['width']) || 0;
      line.style.width = widthPx + 'px';

      // border
      const border = parseBorder(block.props['border']);
      if (border) {
        line.style.borderTop = `${border.width}px ${border.style} ${border.color}`;
      }

      // transforms
      const t = parseTransform(block.props['transform']);
      if (t) {
        if (t.type === 'rotate') {
          el.style.transform = `rotate(${t.angle}deg)`;
        } else if (t.type === 'matrix') {
          el.style.transform = `matrix(${t.a}, ${t.b}, ${t.c}, ${t.d}, ${t.e}, ${t.f})`;
        } else if (t.type === 'raw') {
          el.style.transform = t.value;
        }
      }

      el.appendChild(line);
      stage.appendChild(el);
    }

    function renderBlocks(blocks) {
      stage.innerHTML = '';
      for (const block of blocks) {
        const type = classifyBlock(block);
        if (type === 'arrow') renderArrow(block);
        else if (type === 'text') renderText(block);
        else renderFrame(block);
      }
    }

    function setZoom(z) {
      const zoom = Math.max(0.1, Math.min(3, z));
      stage.style.transform = `scale(${zoom})`;
    }

    function fitToWidth() {
      const visibleWidth = stageWrap.clientWidth - 32; // account for padding/scrollbar
      const scale = visibleWidth / stage.clientWidth;
      setZoom(Math.max(0.1, Math.min(3, scale)));
    }

    function onRenderClick() {
      const spec = specInput.value.trim();
      const blocks = parseBlocks(spec);
      renderBlocks(blocks);
    }

    zoomInput.addEventListener('input', (e) => setZoom(parseFloat(e.target.value)));
    fitWidthBtn.addEventListener('click', () => fitToWidth());
    clearBtn.addEventListener('click', () => { stage.innerHTML = ''; });
    renderBtn.addEventListener('click', onRenderClick);
